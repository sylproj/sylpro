{% extends "base.html" %}
{% block title %}Add User{% endblock %}
{% block content %}
<div class="ph">
    <div class="ph-row">
        <div><h1 class="ph-title">Add User</h1><p class="ph-sub">Create a new system account</p></div>
        <a href="{{ url_for('admin_users') }}" class="btn btn-outline"><i class="bi bi-arrow-left"></i>Back</a>
    </div>
</div>
<div class="row justify-content-center">
<div class="col-md-7">
<div class="card">
    <div class="card-hd"><i class="bi bi-person-plus"></i>New User Details</div>
    <div class="card-bd">
    <form method="POST">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Role</label>
                <select name="role" class="form-select" id="roleSelect">
                    <option value="admin">Admin</option>
                    <option value="counselor">Counselor</option>
                    <option value="lecturer">Lecturer</option>
                    <option value="student">Student</option>
                </select>
            </div>

            <div id="studentFields" class="col-12 d-none">
                <hr class="divider">
                <p style="font-size:.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:1rem">Student Details</p>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Student No.</label>
                        <input type="text" name="student_no" class="form-control" placeholder="e.g. STU2024001">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Course</label>
                        <input type="text" name="course" class="form-control" placeholder="e.g. Computer Science">
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Year</label>
                        <select name="year" class="form-select">
                            <option>1</option><option>2</option><option>3</option><option>4</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label class="form-label">Age</label>
                        <input type="number" name="age" class="form-control" value="18" min="16" max="40">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Gender</label>
                        <select name="gender" class="form-select">
                            <option value="0">Female</option>
                            <option value="1">Male</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="col-12" style="display:flex;gap:8px;margin-top:.25rem">
                <button type="submit" class="btn btn-primary"><i class="bi bi-check"></i>Create User</button>
                <a href="{{ url_for('admin_users') }}" class="btn btn-outline">Cancel</a>
            </div>
        </div>
    </form>
    </div>
</div>
</div>
</div>

<script>
    document.getElementById('roleSelect').addEventListener('change', function () {
        document.getElementById('studentFields').classList.toggle('d-none', this.value !== 'student');
    });
</script>

{% endblock %}
{% block extra_scripts %}{% endblock %}
